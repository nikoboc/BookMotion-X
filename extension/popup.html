<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, "Segoe UI", sans-serif;
        width: 320px;
        padding: 12px;
        margin: 0;
      }
      h3 { margin: 0 0 8px; font-size: 14px; }
      button {
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #d5a020;
        background: #f3c33b;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      button.secondary {
        margin-top: 8px;
        background: #f3f3f3;
        border-color: #bbb;
        color: #333;
      }
      .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
      a.link { font-size: 12px; color: #0a58ca; cursor: pointer; text-decoration: none; }
      #status { margin-top: 10px; font-size: 12px; color: #333; min-height: 16px; }
      #summary {
        margin-top: 8px;
        font-size: 11px;
        white-space: pre-wrap;
        color: #555;
        max-height: 160px;
        overflow: auto;
        background: #f6f6f6;
        border-radius: 6px;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <h3>Kindle → Notion</h3>
    <button id="sync">Kindle → Notion 同期</button>
    <button id="syncTest" class="secondary">テスト同期（先頭1冊だけ）</button>
    <button id="run" class="secondary">JSON だけダウンロード</button>
    <div class="row">
      <a class="link" id="openOptions">⚙ Notion 設定</a>
    </div>
    <div id="status"></div>
    <pre id="summary"></pre>
    <script src="popup.js"></script>
  </body>
</html>
